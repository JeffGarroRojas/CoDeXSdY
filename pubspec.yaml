name: codex_sdy
description: AI-powered study assistant for Costa Rican students.
publish_to: 'none'
version: 1.3.3+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Estado (Riverpod puro)
  flutter_riverpod: ^2.6.1
  
  # Persistencia Local (Hive - compatible con web!)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Compartir/Exportar
  share_plus: ^10.1.4
  
  # IA (Groq + Gemini)
  dio: ^5.7.0
  google_generative_ai: ^0.4.0
  just_audio: ^0.9.40
  
  # PDF
  syncfusion_flutter_pdf: ^28.1.35
  file_picker: ^8.1.6
  
  # UI Premium
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  
  # Utilidades
  uuid: ^4.5.1
  intl: 0.20.2
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  flutter_dotenv: ^5.2.1
  
  # Cámara y Voz
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.1
  firebase_remote_config: ^5.1.0
  google_sign_in: ^6.2.2
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # OTA Updates
  shorebird_code_push: ^2.0.5
  http: ^1.2.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logonuevo.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/logonuevo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - shorebird.yaml
    - .env

  fonts:
    - family: Aquire
      fonts:
        - asset: assets/fonts/AquireBold-8Ma60.otf
          weight: 700
        - asset: assets/fonts/Aquire-BW0ox.otf
        - asset: assets/fonts/AquireLight-YzE0o.otf
          weight: 300
